<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
   <div id="navbar-placeholder"></div> 



  <section class="banner position-relative">
    <img width="100%" src="gallery/contact/25.png" alt="">
    <div class="banner-text position-absolute">
        <h1 class="text-uppercase text-center">Contact us</h1>
    </div>
</section>
<section class="get-in-touch text-center">
    <h2 class="heading fs-1">Get in Touch With Us</h2>
    <p>We’d love to hear from you! <br>
Please complete the form below and one of our staff members will be in touch shortly. Let’s plan something incredible together.</p>
        <div class="contact-cards position-relative">
            <div class="contact-card">
                <img src="gallery/contact/113.png" alt="">
                <p class="fw-bold">09257001999</p>
            </div>
            <div class="contact-card">
                <img src="gallery/contact/114.png" alt="">
                <p class="fw-bold">info@experientialpathways.com</p>
            </div>
            <div class="contact-card">
                <img src="gallery/contact/115.png" alt="">
                <p class="fw-bold">09257001999</p>
            </div>
            <img src="gallery/contact/21_2.png" width="100%" class="last-img position-absolute" alt="">
        </div>

</section>
<section class="contact-form">
    <div class="container">
        <div class="map"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d114487.42465756039!2d73.03054325000001!3d26.2703594!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4085e077cb8384d7%3A0xd73127c925a4b9ed!2sExperiential%20Pathways!5e0!3m2!1sen!2sin!4v1770193104042!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
        <div class="form">
            <div class="container">

                <form action="" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label text-uppercase">Your Name</label>
                        <input type="text" class="form-control" id="username">
                    </div>
                    <div class="mb-3">
                        <label for="useremail" class="form-label text-uppercase">YOUR EMAIL</label>
                        <input type="email" class="form-control" id="useremail">
                    </div>
                    <div class="mb-3">
                        <label for="subject" class="form-label text-uppercase">SUBJECT</label>
                        <input type="text" class="form-control" id="subject">
                    </div>
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label">YOUR MESSAGE (OPTIONAL)</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="6"></textarea>
                    </div>
                    <button>SUBMIT</button>
                </form>
            </div>
        </div>
    </div>
    <div class="last-img">
         <img src="gallery/home-page/20.png" class="upper" width="100%" alt="">
        <img width="100%" class="position-absolute" src="gallery/contact/18_1.png" alt="">
    </div>
</section>
     <div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
  <script src="script.js"></script>
</body>
</html>
